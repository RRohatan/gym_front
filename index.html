    <title>Cosmogym</title>
    <!-- Anti-FOUC: aplica el tema antes de que Vue monte -->

      (function () {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <script src="/fingerprint.sdk.min.js"></script>

  </body>
